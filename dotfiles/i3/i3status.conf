# i3status — drives the i3bar status line for the i3 (X11) session.
# Reproduces the readouts from the Debian i3blocks setup (net / cpu / mem /
# battery / temp / clock) without the /usr/share/i3blocks helper scripts,
# which do not exist on NixOS.
general {
        colors = true
        markup = "pango"
        interval = 5
        color_good = "#a1c659"
        color_bad = "#fb0120"
        color_degraded = "#fda331"
}

order += "wireless wlp1s0"
order += "ethernet tailscale0"
order += "cpu_usage"
order += "memory"
order += "battery 0"
order += "cpu_temperature 0"
order += "disk /"
order += "tztime local"

wireless wlp1s0 {
        format_up = " %essid %quality"
        format_down = " down"
}

ethernet tailscale0 {
        format_up = " %ip"
        format_down = ""
}

cpu_usage {
        format = " %usage"
}

memory {
        format = " %used"
        threshold_degraded = "10%"
        format_degraded = " %free"
}

battery 0 {
        format = "%status %percentage"
        status_chr = "⚡"
        status_bat = "BAT"
        status_full = "FULL"
        integer_battery_capacity = true
        low_threshold = 15
}

cpu_temperature 0 {
        format = " %degrees°C"
}

disk "/" {
        format = " %free"
}

tztime local {
        format = "%A, %d %B %Y %H:%M:%S"
}
