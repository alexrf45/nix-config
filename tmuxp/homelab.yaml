# Home lab session — homelab ops, notes, shell
# Usage: tmuxp load ~/.config/tmuxp/homelab.yaml
session_name: home-lab
windows:
  - window_name: home-ops
    layout: tiled
    panes:
      - cd ~/home-ops/ && nvim .
  - window_name: notes
    layout: tiled
    panes:
      - cd ~/fr3d/ && nvim .
  - window_name: shell
    layout: tiled
    panes:
      - cd ~
