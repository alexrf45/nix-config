# Home lab session — kubectl, k9s, flux, homelab ops
# Mirrors debian-desktop.yaml (renamed to homelab.yaml for NixOS)
# Usage: tmuxp load ~/.config/tmuxp/homelab.yaml
session_name: home-lab
windows:
  - window_name: home-ops
    layout: tiled
    panes:
      - cd ~/home-ops/ && nvim .
  - window_name: k9s
    layout: tiled
    panes:
      - k9s
  - window_name: notes
    layout: tiled
    panes:
      - cd ~/fr3d/ && nvim .
  - window_name: shell
    layout: tiled
    panes:
      - cd ~
