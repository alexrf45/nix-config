# SOPS configuration — maps secret files to the age key(s) that can decrypt them.
#
# Setup (run on the machine, not in CI):
#   1. Generate your age key:
#        age-keygen -o ~/.config/sops/age/keys.txt
#   2. Copy the public key from the output (age1...) and paste it below.
#   3. Create a secrets file:
#        sops secrets/nitro5.yaml
#   4. The age key file MUST NOT be committed to this repo.
#
# Re-encryption (when adding a new key or rotating):
#   sops updatekeys secrets/nitro5.yaml
#
creation_rules:
  - path_regex: secrets/laptops\.yaml$
    key_groups:
      - age:
          # REPLACE with your actual age public key (age1...)
          - age17hpty940wu5d289u87qpea0h6663r7jq88gwuspf4n4gasqw23nspa0cjv

