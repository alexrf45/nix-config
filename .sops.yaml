# SOPS configuration — maps secret files to the age key(s) that can decrypt them.
#
# thoth uses its SSH host key as the age decryption key (Option A).
# To get the age public key, run on thoth:
#   cat /etc/ssh/ssh_host_ed25519_key.pub | ssh-to-age
# Paste the output (age1...) in place of the CHANGEME placeholder below,
# then re-encrypt: sops updatekeys secrets/thoth.yaml
#
# Re-encryption (when rotating or adding a key):
#   sops updatekeys secrets/thoth.yaml
#
creation_rules:
  - path_regex: secrets/thoth\.yaml$
    key_groups:
      - age:
          - age1gzcf5npkkwtg3cr03euj8m99lay3une4c6uqpzs3gxpeg9qmsp5stww3dl
